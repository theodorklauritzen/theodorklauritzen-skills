name: Release Skills

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .skill files
        run: |
          mkdir -p dist
          for name in skills/*/; do
            name=$(basename "$name")
            case "$name" in
              .*) continue ;;
            esac
            (cd skills && zip -r "../dist/${name}.skill" "${name}")
          done

      - name: Create release tag
        id: tag
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" dist/*.skill \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes ""
